name: Update static market data

on:
  schedule:
    - cron: "*/30 14-21 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test trade-alert email only (skip full data refresh)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh-static-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send test trade-alert email
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_email }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
        run: python update_static_market_data.py --test-email

      - name: Refresh static market data
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_email) }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
        run: python update_static_market_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spx_daily.csv latest_signal.json spx_guarded_site_data.json spx_etp_returns.json \
            ndx_daily.csv latest_ndx_signal.json ndx_guarded_site_data.json ndx_etp_returns.json \
            gold_daily.csv latest_gold_signal.json gold_guarded_site_data.json \
            ftse250_daily.csv latest_ftse250_signal.json ftse250_guarded_site_data.json \
            msci_em_daily.csv latest_msci_em_signal.json msci_em_guarded_site_data.json \
            dax_daily.csv latest_dax_signal.json dax_guarded_site_data.json \
            msci_world_daily.csv latest_msci_world_signal.json msci_world_guarded_site_data.json \
            news_score.json
          if git diff --cached --quiet; then
            echo "No market data changes to commit."
          else
            git commit -m "Update static market data"
            git push || (git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push)
          fi
